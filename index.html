<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta
      name="description"
      content="2 FTS ballast weight calculator for glider pilots, including single-passenger and multiple-passenger planning."
    >
    <title>2 FTS Ballast Weight App</title>
    <link rel="icon" type="image/png" href="www/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="www/favicon.svg" />
    <link rel="shortcut icon" href="www/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="www/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="Ballast App" />
    <link rel="manifest" href="www/site.webmanifest" />
    <link rel="stylesheet" href="assets/styles.css">
    
    <style>
      .passenger-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 12px;
      }
      .staff-toggle {
        width: 38px;
        height: 38px;
        border: 1px solid #ccc;
        border-radius: 4px;
        background: #fff;
        cursor: pointer;
        font-weight: bold;
        flex-shrink: 0;
        transition: all 0.2s ease;
      }
      .staff-toggle.is-active {
        background: #ff4d4d !important;
        color: white !important;
        border-color: #b30000 !important;
      }
      /* Adjusting the existing layout to fit the button */
      .passenger-list .field {
        margin-bottom: 0;
        flex-grow: 1;
      }
    </style>

    <script defer src="assets/vendor/jspdf.umd.min.js"></script>
    <script defer src="assets/vendor/jspdf.plugin.autotable.min.js"></script>
    <script src="JS/app.js"></script>
  </head>
  <body>
    <noscript>
      <div class="noscript-banner">
        JavaScript is required to use this calculator.
      </div>
    </noscript>

    <div id="loadOverlay" class="load-overlay is-active" role="alert" aria-live="assertive">
      <div class="load-card">
        <p id="loadEyebrow" class="hero__eyebrow">Loading aircraft data</p>
        <h2 id="loadTitle">Preparing the ballast calculator</h2>
        <p id="loadMessage">
          Please wait while the latest aircraft data is retrieved.
        </p>
        <button id="retryLoadButton" class="button button--primary" type="button" hidden>
          Retry
        </button>
      </div>
    </div>

    <div class="page-shell">
      <header class="hero">
        <div class="hero__top">
          <div class="hero__brand">
            <img
              class="hero__image"
              src="www/2FTS KC.png"
              alt="2 FTS crest"
              width="80"
              height="100"
            >
            <div class="hero__copy">
              <p class="hero__eyebrow">2 FTS</p>
              <h1>Ballast Weight App</h1>
              <p class="hero__lead">
                For information only. Responsibility remains with the Aircraft Commander.
              </p>
            </div>
          </div>

          <div class="hero__links">
            <a
              class="button button--ghost"
              href="https://github.com/2fts-vgs/ballast"
              target="_blank"
              rel="noreferrer"
            >
              Source Code
            </a>
